<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Futuristic Weather Station</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1 class="title">🌐 FUTURE WEATHER SYSTEM</h1>

  <div class="grid">

    <div class="card">
      <h3>Temperature</h3>
      <p id="temp">-- °C</p>
    </div>

    <div class="card">
      <h3>Humidity</h3>
      <p id="hum">-- %</p>
    </div>

    <div class="card">
      <h3>Wind</h3>
      <p id="wind">-- km/h</p>
    </div>

    <div class="card">
      <h3>Condition</h3>
      <p id="rain">--</p>
    </div>

  </div>

  <p class="footer">Live Weather Dashboard • Futuristic UI</p>
</div>

<script src="java.js"></script>

</body>
</html>
