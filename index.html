<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Weather Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌦️ NEON WEATHER PRO</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Search city...">
        <button onclick="searchCity()">Search</button>
        <button onclick="getLocationWeather()">📍 My Location</button>
    </div>

    <div class="weather-card">

        <h2 id="cityName">Loading...</h2>

        <div class="main-temp">
            <span id="temp">--</span>°C
        </div>

        <p id="condition">Weather Loading...</p>

        <div class="grid">

            <div class="box">
                💧 Humidity<br>
                <span id="humidity">--</span>%
            </div>

            <div class="box">
                💨 Wind<br>
                <span id="wind">--</span> km/h
            </div>

            <div class="box">
                🌡 Feels Like<br>
                <span id="feels">--</span>°C
            </div>

            <div class="box">
                ☀ UV Index<br>
                <span id="uv">--</span>
            </div>

            <div class="box">
                🌅 Sunrise<br>
                <span id="sunrise">--</span>
            </div>

            <div class="box">
                🌇 Sunset<br>
                <span id="sunset">--</span>
            </div>

            <div class="box">
                🌧 Rain Chance<br>
                <span id="rain">--</span>%
            </div>

            <div class="box">
                🧭 Direction<br>
                <span id="direction">--</span>
            </div>

        </div>

    </div>

    <h2>📅 7 Day Forecast</h2>
    <div id="forecast"></div>

    <h2>🕒 Hourly Forecast</h2>
    <div id="hourly"></div>

</div>

<script src="java.js"></script>
</body>
</html>
